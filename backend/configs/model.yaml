# 项目配置文件

# 项目基本信息
project_name: "LoongClaw-Railway-Forecast"
seed: 42

# 数据配置
data:
  train_path: "data/processed/train"
  val_path: "data/processed/val"
  test_path: "data/processed/test"
  raw_path: "data/raw"
  external_path: "data/external"

# 模型配置
model:
  name: "MambaSwin-UNet-STA"
  in_channels: 1
  out_channels: 1
  base_channels: 64
  time_steps: 6
  forecast_steps: 6
  use_loongclaw: true
  
  # Mamba配置
  mamba:
    d_state: 16
    d_conv: 3
    expand: 2
  
  # Swin配置
  swin:
    window_size: 8
    num_heads: 8
  
  # 时空注意力配置
  sta:
    num_heads: 8
    dropout: 0.1

# 训练配置
training:
  epochs: 200
  batch_size: 16
  lr: 0.0001
  weight_decay: 0.01
  num_workers: 4
  accelerator: "auto"  # auto, gpu, cpu
  devices: 1
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  early_stopping_patience: 20
  checkpoint_dir: "checkpoints"
  augmentation: true
  precision: "32"  # 16 for mixed precision

# 物理约束配置
physics:
  mass_conservation_weight: 0.05
  terrain_weight: 0.05
  smoothness_weight: 0.01

# 损失函数配置
loss:
  mse_weight: 1.0
  weighted_mse_weight: 0.5
  focal_weight: 0.3
  ssim_weight: 0.2
  smoothness_weight: 0.1
  non_negative_weight: 0.1

# 日志配置
logging:
  log_dir: "logs"
  use_wandb: false
  wandb_project: "loongclaw-forecast"

# 评估配置
evaluation:
  thresholds: [0.1, 0.5, 1.0, 2.5, 5.0, 10.0, 20.0]  # mm/h
  metrics: ["ts", "pod", "far", "csi", "ets"]

# 路径配置
paths:
  data: "data"
  models: "models"
  outputs: "outputs"
  logs: "logs"
